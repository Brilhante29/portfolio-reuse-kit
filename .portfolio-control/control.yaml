version: 1
source_of_truth: portfolio-reuse-kit
portfolio_root: ..
principles:
  architecture_by_problem: true
  local_first_cloud_pluggable: true
  benchmark_before_publication: true
  no_mutable_dependencies: true
  no_secrets_in_repository: true
  publication_requires_remote_ci_evidence: true
quality_gates:
  - numbered_readme
  - sdd_and_openspec
  - docker_reproducibility
  - ci_checks
  - benchmark_json
  - reuse_review
  - independent_review
  - tracked_contract_valid_benchmark
  - verified_publication
agent_roles:
  - reuse-architect
  - repository-auditor
  - sdd-spec-agent
  - implementation-agent
  - docker-ci-agent
  - benchmark-agent
  - documentation-agent
  - independent-reviewer
execution_telemetry:
  event_log: .portfolio-control/EXECUTION_EVENTS.jsonl
  report: .portfolio-control/EXECUTION_EFFICIENCY.md
  handoff: .portfolio-control/CURRENT_HANDOFF.md
  schema: contracts/execution-event.schema.json
  excluded_windows:
    - date: 2026-07-20
      owner: user
      tools: [Antigravity, OpenCode]
      reason: Excluded from Codex efficiency accounting at the user request.
